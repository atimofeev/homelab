---
applications:

  convertx:
    project: default
    source:
      repoURL: https://github.com/atimofeev/homelab
      targetRevision: HEAD
      path: applications/convertx
    destination:
      server: https://kubernetes.default.svc
      namespace: convertx
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true

  vert:
    project: default
    source:
      repoURL: https://github.com/atimofeev/homelab
      targetRevision: HEAD
      path: applications/vert
    destination:
      server: https://kubernetes.default.svc
      namespace: vert
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true
