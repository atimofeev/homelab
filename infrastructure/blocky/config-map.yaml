---
apiVersion: v1
kind: ConfigMap

metadata:
  name: blocky-config
  namespace: blocky
  labels:
    app: blocky

data:
  config.yml: |-
    upstreams:
      groups:
        default:
          - 192.168.88.1
          - 1.1.1.1
          - 8.8.8.8
    blocking:
      denylists:
        ads:
          - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
      clientGroupsBlock:
        default:
          - ads
    ports:
      dns: 53
      http: 4000
