---
applications:

  metallb-l2-ip-pool:
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "-8"
    project: default
    source:
      repoURL: https://github.com/atimofeev/homelab
      targetRevision: HEAD
      path: apps/metallb
    destination:
      server: https://kubernetes.default.svc
      namespace: metallb-system
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true

  cert-manager-issuer:
    additionalAnnotations:
      argocd.argoproj.io/sync-wave: "-8"
