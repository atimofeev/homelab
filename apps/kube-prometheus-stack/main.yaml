---
apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"

spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 82.4.3
    helm:
      releaseName: kube-prometheus-stack
      valuesObject:
        alertmanager:
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts: [alertmanager.prosto.dev]
            annotations:
              item.homer.rajsingh.info/name: "Alertmanager"
              item.homer.rajsingh.info/subtitle: "Monitoring Alerts Management"
              item.homer.rajsingh.info/logo: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/webp/alertmanager.webp"
              service.homer.rajsingh.info/name: "Observability"
              service.homer.rajsingh.info/icon: "fas fa-eye"
        grafana:
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
          persistence:
            enabled: true
            size: 10Gi
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts: [grafana.prosto.dev]
            annotations:
              item.homer.rajsingh.info/name: "Grafana"
              item.homer.rajsingh.info/subtitle: "Monitoring Dashboards"
              item.homer.rajsingh.info/logo: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/webp/grafana.webp"
              service.homer.rajsingh.info/name: "Observability"
              service.homer.rajsingh.info/icon: "fas fa-eye"
        prometheus:
          ingress:
            enabled: true
            ingressClassName: nginx
            hosts: [prometheus.prosto.dev]
            annotations:
              item.homer.rajsingh.info/name: "Prometheus"
              item.homer.rajsingh.info/subtitle: "Metrics TSDB"
              item.homer.rajsingh.info/logo: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/webp/prometheus.webp"
              service.homer.rajsingh.info/name: "Observability"
              service.homer.rajsingh.info/icon: "fas fa-eye"
          prometheusSpec:
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            serviceMonitorSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
        additionalPrometheusRules:
          - name: cert-manager-alerts
            groups:
              - name: cert-manager
                rules:
                  - alert: CertManagerCertificateExpiringSoon
                    expr: |
                      certmanager_certificate_expiration_timestamp_seconds - time() < 86400 * 14
                      and
                      certmanager_certificate_expiration_timestamp_seconds - time() > 0
                    for: 1h
                    labels:
                      severity: warning
                    annotations:
                      summary: "Certificate {{ $labels.name }}/{{ $labels.namespace }} expires in less than 14 days"
                  - alert: CertManagerCertificateExpiringCritical
                    expr: |
                      certmanager_certificate_expiration_timestamp_seconds - time() < 86400 * 3
                      and
                      certmanager_certificate_expiration_timestamp_seconds - time() > 0
                    for: 1h
                    labels:
                      severity: critical
                    annotations:
                      summary: "Certificate {{ $labels.name }}/{{ $labels.namespace }} expires in less than 3 days"
                  - alert: CertManagerCertificateExpired
                    expr: |
                      certmanager_certificate_expiration_timestamp_seconds - time() < 0
                    for: 5m
                    labels:
                      severity: critical
                    annotations:
                      summary: "Certificate {{ $labels.name }}/{{ $labels.namespace }} has expired"
          - name: external-secrets-alerts
            groups:
              - name: external-secrets
                rules:
                  - alert: ExternalSecretSyncError
                    expr: |
                      externalsecret_status_condition{condition="Ready",status="False"} == 1
                    for: 15m
                    labels:
                      severity: critical
                    annotations:
                      summary: "ExternalSecret {{ $labels.name }}/{{ $labels.namespace }} sync has failed"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
