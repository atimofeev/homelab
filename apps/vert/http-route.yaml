---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute

metadata:
  name: vert
  namespace: vert

spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - "vert.prosto.dev"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vert
          port: 80
