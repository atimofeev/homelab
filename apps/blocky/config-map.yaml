---
apiVersion: v1
kind: ConfigMap

metadata:
  name: blocky-config
  namespace: blocky
  labels:
    app: blocky

data:
  config.yml: |-
    upstreams:
      groups:
        default:
          - tcp-tls:1.1.1.1:853
          - tcp-tls:8.8.8.8:853
    blocking:
      denylists:
        ads:
          - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
          - https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/wildcard/pro.txt
      clientGroupsBlock:
        default:
          - ads
    ports:
      dns: 53
      http: 4000
