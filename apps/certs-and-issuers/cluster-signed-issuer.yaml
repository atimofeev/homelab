---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer

metadata:
  name: cluster-selfsigned-issuer

spec:
  selfSigned: {}

---
apiVersion: cert-manager.io/v1
kind: Certificate

metadata:
  name: cluster-signed-issuer
  namespace: cert-manager

spec:
  isCA: true
  commonName: cluster-signed-issuer
  secretName: cluster-signed-issuer-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: cluster-selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer

metadata:
  name: cluster-signed-issuer

spec:
  ca:
    secretName: cluster-signed-issuer-secret
