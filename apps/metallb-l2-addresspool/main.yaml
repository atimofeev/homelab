---
apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: metallb-l2-addresspool
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-8"

spec:
  project: default
  source:
    repoURL: https://github.com/atimofeev/homelab
    targetRevision: HEAD
    path: apps/metallb-l2-addresspool
    directory:
      exclude: main.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
