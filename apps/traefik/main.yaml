---
apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "-9"

spec:
  project: default
  source:
    repoURL: oci://ghcr.io/traefik/helm/traefik
    chart: traefik
    targetRevision: 40.0.0-ea.1
    helm:
      releaseName: traefik
      valuesObject:
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
