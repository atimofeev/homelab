---
apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: reloader
  namespace: argocd

spec:
  project: default
  source:
    repoURL: https://stakater.github.io/stakater-charts
    chart: reloader
    targetRevision: v2.2.9
    helm:
      releaseName: reloader
  destination:
    server: https://kubernetes.default.svc
    namespace: reloader
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
