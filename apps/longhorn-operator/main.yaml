---
apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: longhorn-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"

spec:
  project: default
  source:
    repoURL: https://charts.longhorn.io
    chart: longhorn
    targetRevision: 1.10.2
    helm:
      releaseName: longhorn
      valuesObject:
        preUpgradeChecker:
          jobEnabled: false
        ingress:
          enabled: true
          host: longhorn.prosto.dev
          ingressClassName: nginx
          secureBackends: true
          annotations:
            item.homer.rajsingh.info/name: "Longhorn"
            item.homer.rajsingh.info/subtitle: "Distributed Storage"
            item.homer.rajsingh.info/logo: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/webp/longhorn.webp"
            service.homer.rajsingh.info/name: "System"
            service.homer.rajsingh.info/icon: "fas fa-cogs"
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/audit: privileged
        pod-security.kubernetes.io/warn: privileged
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
