---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute

metadata:
  name: bento-pdf
  namespace: bento-pdf
  annotations:
    item.homer.rajsingh.info/name: "BentoPDF"
    item.homer.rajsingh.info/subtitle: "PDF Tools"
    item.homer.rajsingh.info/logo: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/webp/bentopdf.webp"
    service.homer.rajsingh.info/name: "Tools"
    service.homer.rajsingh.info/icon: "fas fa-screwdriver-wrench"

spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - "bento-pdf.prosto.dev"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: bento-pdf
          port: 80
