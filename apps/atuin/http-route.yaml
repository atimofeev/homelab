---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute

metadata:
  name: atuin
  namespace: atuin

spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - atuin.prosto.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: atuin
          port: 80
