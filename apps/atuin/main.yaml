---
apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: atuin
  namespace: argocd

spec:
  project: default
  source:
    repoURL: https://github.com/atimofeev/homelab
    targetRevision: HEAD
    path: apps/atuin
    directory:
      exclude: main.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: atuin
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
