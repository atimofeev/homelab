---
apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: garage-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"

spec:
  project: default
  source:
    repoURL: oci://ghcr.io/rajsinghtech/charts/garage-operator
    chart: garage-operator
    targetRevision: 0.2.8
    helm:
      releaseName: garage-operator
      valuesObject:
        serviceMonitor:
          enabled: true
        grafanaDashboard:
          enabled: true
        prometheusRules:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: garage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
